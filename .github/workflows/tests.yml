name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - session: test
            python-version: "3.10"
            extras: "test"
            test-path: "tests"
          - session: test_comparison
            python-version: "3.10"
            extras: "test,comparison"
            test-path: "tests/core_test.py"
          - session: test_pymc3
            python-version: "3.10"
            extras: "test,pymc3"
            test-path: "tests/pymc3_test.py"
          - session: test_pymc
            python-version: "3.10"
            extras: "test,pymc"
            test-path: "tests/pymc_test.py"
          - session: test_pymc_jax
            python-version: "3.10"
            extras: "test,pymc,jax"
            test-path: "tests/pymc_jax_test.py"
          - session: test_jax
            python-version: "3.10"
            extras: "test,jax"
            test-path: "tests/jax_test.py"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python
        run: uv python install

      - name: Create venv and install dependencies
        run: |
          uv venv
          uv pip install ".[${{ matrix.extras }}]"

      - name: Run tests
        run: .venv/bin/pytest -v ${{ matrix.test-path }}
