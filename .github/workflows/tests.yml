name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]
        os: ["ubuntu-latest"]
        include:
          - session: test
            uv-extras: "--extra test"
            test-path: "tests"
          - session: test_comparison
            uv-extras: "--extra test --extra comparison"
            test-path: "tests/core_test.py"
          - session: test_pymc3
            uv-extras: "--extra test --extra pymc3"
            test-path: "tests/pymc3_test.py"
          - session: test_pymc
            uv-extras: "--extra test --extra pymc"
            test-path: "tests/pymc_test.py"
          - session: test_pymc_jax
            uv-extras: "--extra test --extra pymc --extra jax"
            test-path: "tests/pymc_jax_test.py"
          - session: test_jax
            uv-extras: "--extra test --extra jax"
            test-path: "tests/jax_test.py"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run ${{ matrix.uv-extras }} pytest -v ${{ matrix.test-path }}
