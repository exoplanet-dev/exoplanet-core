name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - session: test
            python-version: "3.12"
            uv-extra-args: "--extra test"
            test-path: "tests"
          - session: test
            python-version: "3.14"
            uv-extra-args: "--extra test"
            test-path: "tests"
          - session: test_pymc
            python-version: "3.14"
            uv-extra-args: "--extra test --extra pymc"
            test-path: "tests/pymc_test.py"
          - session: test_pymc_jax
            python-version: "3.14"
            uv-extra-args: "--extra test --extra pymc --extra jax"
            test-path: "tests/pymc_jax_test.py"
          - session: test_jax
            python-version: "3.14"
            uv-extra-args: "--extra test --extra jax"
            test-path: "tests/jax_test.py"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run ${{ matrix.uv-extra-args }} pytest -v ${{ matrix.test-path }}
